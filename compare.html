    futureNoChange: ['工作占比越来越大','个人空间越来越小','身体开始出问题','自我越来越模糊','突然有一天崩掉'],
    futureWithChange: ['建立生活支点','找到工作之外的价值','恢复弹性空间','重新获得掌控感'],
    actionPlan: [{week:'第1周',title:'盘点时间账',description:'真实记录一周时间分配。看看工作和生活的比例到底是多少。'},{week:'第2周',title:'找回一个小爱好',description:'想想以前喜欢但很久没做的事。花30分钟重新做一次。'},{week:'第3周',title:'建立社交支点',description:'约一个非工作的朋友吃饭。不聊工作，只聊生活。'},{week:'第4周',title:'重新分配',description:'试着把时间的10%从工作挪到生活。感受一下这个变化。'}],
    hiddenAdvantage: '专注力很强',
    shouldNotDo: '继续单向冲刺',
    keywords: ['生活失衡','单点支撑','自我压缩','失去弹性','人生结构重建'],
  }
};

let ORIGINAL_DATA = null;
let currentType = 'career_mismatch';

// ===== 加载原始数据 =====
fetch('appmiaoda_original.json')
  .then(r => r.json())
  .then(d => {
    ORIGINAL_DATA = d;
    init();
  })
  .catch(e => {
    document.getElementById('leftPanel').innerHTML = '<div class="loading" style="color:red">加载失败: ' + e.message + '</div>';
  });

function init() {
  // Tabs
  var tabsHTML = '';
  TYPE_KEYS.forEach(function(k) {
    tabsHTML += '<button class="tab' + (k===currentType?' active':'') + '" onclick="switchType(\'' + k + '\')">' + TYPE_NAMES[k] + '</button>';
  });
  document.getElementById('tabs').innerHTML = tabsHTML;
  switchType(currentType);
}

function switchType(key) {
  currentType = key;
  document.querySelectorAll('.tab').forEach(function(t) { t.className = 'tab'; });
  event.target.className = 'tab active';
  if (!ORIGINAL_DATA) return;
  renderPanel('leftPanel', ORIGINAL_DATA[key], 'original');
  renderPanel('rightPanel', OUR_DATA[key], 'ours');
}

function renderPanel(id, data, side) {
  var isOrig = side === 'original';
  var html = '';

  // Title + subtitle
  html += '<h2>' + (isOrig ? '🔶 ' : '🔷 ') + data.title + '</h2>';
  html += '<div class="meta">' + (isOrig ? 'appmiaoda 原版' : '我们的改写') + '</div>';

  // Match type
  html += '<div class="match-type">' + data.subtitle + '</div>';

  // Core conclusion
  html += '<div class="section"><div class="section-title">核心结论</div>';
  html += '<div class="field-value highlight">' + data.coreConclusion + '</div></div>';

  // Summary
  html += '<div class="section"><div class="section-title">一句话</div>';
  html += '<div class="field-value subtitle">' + data.summary + '</div></div>';

  // Deep analysis
  html += '<div class="section"><div class="section-title">深度分析</div>';
  (data.deepAnalysis||[]).forEach(function(a) {
    html += '<div class="analysis-item ' + side + '">' + a + '</div>';
  });
  html += '</div>';

  // Consumption
  html += '<div class="section"><div class="section-title">消耗来源</div>';
  (data.consumptionSources||[]).forEach(function(s) {
    html += '<div class="field"><div class="field-label"><strong>' + s.title + '</strong></div>';
    html += '<div class="field-value">' + s.description + '</div></div>';
  });
  html += '</div>';

  // Advantages
  html += '<div class="section"><div class="section-title">优势</div><ul>';
  (data.advantages||[]).forEach(function(a) { html += '<li>' + a + '</li>'; });
  html += '</ul></div>';

  // Blind spots
  html += '<div class="section"><div class="section-title">盲区</div>';
  (data.blindSpots||[]).forEach(function(b) {
    html += '<div class="field"><div class="field-label"><strong>' + b.title + '</strong></div>';
    html += '<div class="field-value">' + b.description + '</div></div>';
  });
  html += '</div>';

  // Risk
  html += '<div class="section"><div class="section-title">风险预警</div>';
  (data.riskWarning||[]).forEach(function(r) {
    html += '<div class="field"><span style="color:#888;font-size:11px">' + r.label + ': </span>';
    html += '<span style="font-size:13px">' + r.text + '</span></div>';
  });
  html += '</div>';

  // Future
  html += '<div class="section"><div class="section-title">不改变 vs 改变</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  html += '<div><div style="font-size:11px;color:#dc2626;margin-bottom:4px">不改变</div><ul>';
  (data.futureNoChange||[]).forEach(function(f) { html += '<li>' + f + '</li>'; });
  html += '</ul></div>';
  html += '<div><div style="font-size:11px;color:#16a34a;margin-bottom:4px">改变</div><ul>';
  (data.futureWithChange||[]).forEach(function(f) { html += '<li>' + f + '</li>'; });
  html += '</ul></div></div></div>';

  // Action plan
  html += '<div class="section"><div class="section-title">4周行动</div>';
  (data.actionPlan||[]).forEach(function(a) {
    html += '<div class="field"><strong>' + a.week + ' ' + a.title + '</strong>: ' + a.description + '</div>';
  });
  html += '</div>';

  // Bottom
  html += '<div class="section"><div class="section-title">额外</div>';
  html += '<div class="field"><span class="field-label">隐藏优势: </span>' + data.hiddenAdvantage + '</div>';
  html += '<div class="field"><span class="field-label">不该做: </span><span style="color:#dc2626">' + data.shouldNotDo + '</span></div>';
  html += '<div>';
  (data.keywords||[]).forEach(function(k) { html += '<span class="tag">' + k + '</span>'; });
  html += '</div></div>';

  document.getElementById(id).innerHTML = html;
}
</script>
</body>
</html>
